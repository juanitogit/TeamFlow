kind = "web"
previewPath = "/"
title = "TeamFlow"
version = "1.0.0"
id = "artifacts/teamflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24451

[services.development]
run = "pnpm --filter @workspace/teamflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/teamflow", "run", "build" ]
publicDir = "artifacts/teamflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24451"
BASE_PATH = "/"
